<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's for Dinner?</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter for that clean, Swiss-style sans-serif look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Custom Swiss Style Enhancements */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4; /* Off-white for slight contrast with white containers */
            color: #000;
        }

        /* Hide radio buttons natively, we will style their associated labels */
        input[type="radio"] {
            display: none;
        }

        /* Styling the label as a stark, clickable block */
        .swiss-toggle {
            display: block;
            border: 3px solid #000;
            padding: 1rem;
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #fff;
        }

        .swiss-toggle:hover {
            background-color: #e5e5e5;
        }

        /* When the hidden radio is checked, invert the colors of the adjacent label */
        input[type="radio"]:checked + .swiss-toggle {
            background-color: #000;
            color: #fff;
        }

        .swiss-button {
            border: none;
            background-color: #e60000; /* Strong primary red */
            color: white;
            transition: background-color 0.2s ease;
        }

        .swiss-button:hover {
            background-color: #b30000;
        }

        .swiss-border-bottom {
            border-bottom: 4px solid #000;
        }

        /* Adım geçişleri için ufak bir animasyon */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <main class="w-full max-w-4xl bg-white p-6 md:p-12 border-4 border-black shadow-[16px_16px_0px_0px_rgba(0,0,0,1)] relative">
        
        <!-- Geri Butonu -->
        <button id="backBtn" onclick="goBack()" class="hidden absolute top-6 left-6 md:top-12 md:left-12 border-2 border-black bg-white text-black hover:bg-black hover:text-white px-3 py-1.5 font-bold uppercase tracking-tight text-xs md:text-sm flex items-center gap-1 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Gerİ
        </button>
        <!-- Header -->
        <header class="mt-16 mb-12 swiss-border-bottom pb-6">
            <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-none">
                Akşam<br>Yemeğİnde<br><span class="text-[#e60000]">Ne Var?</span>
            </h1>
            <p class="mt-6 text-xl md:text-2xl font-normal text-gray-600 tracking-wide">
                Sizin için en mükemmel yemeği bulalım!
            </p>
        </header>

        <!-- Step 1: Hunger Level -->
        <div id="step1" class="space-y-6 animate-fade-in">
            <h2 class="text-2xl font-bold uppercase mb-4 tracking-tight">Açlık Sevİyenİz Nedİr?</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button type="button" onclick="selectOption(1, 'hunger', 'High')" class="swiss-toggle w-full">Yüksek Açlık</button>
                <button type="button" onclick="selectOption(1, 'hunger', 'Medium')" class="swiss-toggle w-full">Orta Açlık</button>
                <button type="button" onclick="selectOption(1, 'hunger', 'Low')" class="swiss-toggle w-full">Düşük Açlık</button>
            </div>
        </div>

        <!-- Step 2: Time Available -->
        <div id="step2" class="space-y-6 hidden animate-fade-in">
            <h2 class="text-2xl font-bold uppercase mb-4 tracking-tight">Ne Kadar Zamanınız Var?</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button type="button" onclick="selectOption(2, 'time', 'Enough')" class="swiss-toggle w-full">Yeterlİ Zaman</button>
                <button type="button" onclick="selectOption(2, 'time', 'Short')" class="swiss-toggle w-full">Kısıtlı Zaman</button>
            </div>
        </div>

        <!-- Step 3: Budget -->
        <div id="step3" class="space-y-6 hidden animate-fade-in">
            <h2 class="text-2xl font-bold uppercase mb-4 tracking-tight">Ne Kadar Bütçenİz Var?</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button type="button" onclick="selectOption(3, 'budget', 'High')" class="swiss-toggle w-full">Yüksek Bütçe</button>
                <button type="button" onclick="selectOption(3, 'budget', 'Low')" class="swiss-toggle w-full">Düşük Bütçe</button>
            </div>
        </div>

        <!-- Result Area (Step 4) -->
        <div id="step4" class="hidden animate-fade-in mt-4 pt-4 border-t-4 border-black swiss-border-bottom">
            <h2 class="text-xl font-bold uppercase mb-2 tracking-tight text-gray-500">İşte Sİzİn İçİn Önerİmİz!</h2>
            <div id="resultText" class="text-5xl md:text-7xl font-black uppercase tracking-tighter text-[#e60000] leading-none break-words mb-8">
                <!-- Result will be injected here -->
            </div>
            <button type="button" onclick="restart()" class="swiss-toggle bg-black text-white hover:bg-gray-800 w-full py-4 text-2xl border-black">
                Baştan Başla
            </button>
        </div>

    </main>

    <script>
        // The Decision Matrix (Çıktılar Türkçeye çevrildi)
        const decisionMatrix = {
            "High-Short-High": "Gurme Sandvİç",
            "High-Short-Low": "Hazır Noodle",
            "High-Enough-High": "Bİftek",
            "High-Enough-Low": "Menemen",
            "Medium-Short-High": "Dürüm",
            "Medium-Short-Low": "Tost",
            "Medium-Enough-High": "Tavuk Yemeğİ",
            "Medium-Enough-Low": "Çorba",
            "Low-Short-High": "Smoothİe",
            "Low-Short-Low": "Meyve",
            "Low-Enough-High": "Salata Kasesİ",
            "Low-Enough-Low": "Yoğurt"
        };

        // Kullanıcı cevaplarını tutacağımız obje
        let answers = { hunger: '', time: '', budget: '' };

        function selectOption(step, category, value) {
            // Cevabı kaydet
            answers[category] = value;

            // Mevcut adımı gizle
            document.getElementById(`step${step}`).classList.add('hidden');

            // Bir sonraki adımı göster veya sonucu hesapla
            if (step < 3) {
                document.getElementById(`step${step + 1}`).classList.remove('hidden');
            } else {
                showResult();
            }
        }

        function showResult() {
            // Matrix için anahtar oluştur
            const lookupKey = `${answers.hunger}-${answers.time}-${answers.budget}`;
            const recommendation = decisionMatrix[lookupKey];

            // Sonucu göster
            if (recommendation) {
                document.getElementById('resultText').innerText = recommendation;
                document.getElementById('step4').classList.remove('hidden');
            }
        }

        function restart() {
            // Değerleri sıfırla ve başa dön
            answers = { hunger: '', time: '', budget: '' };
            document.getElementById('step4').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
        }
    </script>
</body>
</html>
